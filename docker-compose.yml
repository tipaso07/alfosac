services:
  db:
    image: postgres:18-alpine
    container_name: alfosac-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alfosac}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - alfosac_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-alfosac}"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alfosac-migrate
    profiles:
      - init
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      DB_NAME: ${POSTGRES_DB:-alfosac}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      SQL_DEBUG: ${SQL_DEBUG:-false}
    volumes:
      - ./backups:/backups
    command: ["node", "/app/restore-backup.js"]
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alfosac-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      DB_NAME: ${POSTGRES_DB:-alfosac}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      SQL_DEBUG: ${SQL_DEBUG:-false}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - ./backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');http.get('http://localhost:5000/api/health',res=>{process.exit(res.statusCode===200?0:1)}).on('error',()=>process.exit(1));"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: alfosac-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  alfosac_pgdata:
